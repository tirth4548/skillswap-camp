<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace | SkillSwap Campus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/index.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        .workspace-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: 100vh;
        }

        .chat-section {
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.5);
            position: relative;
            overflow: hidden;
        }

        #chat-pulse-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
        }

        .chat-messages {
            position: relative;
            z-index: 1;
        }

        .board-section {
            padding: 2rem;
            overflow-y: auto;
        }
    </style>
</head>

<body>
    <div class="bg-mesh"></div>
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>
    <div class="floating-orb orb-3"></div>
    <div class="workspace-layout animate-fade-in">
        <!-- Team Chat -->
        <div class="chat-section glass-card-vibrant border-0 border-end rounded-0">
            <div id="chat-pulse-bg"></div>
            <div
                class="p-3 border-bottom border-secondary d-flex justify-content-between align-items-center bg-dark bg-opacity-25">
                <a href="dashboard.html" class="text-white text-decoration-none fw-bold"><i
                        class="bi bi-arrow-left-circle me-2"></i>
                    Workspace Chat</a>
                <div class="d-flex align-items-center gap-2">
                    <img src="https://ui-avatars.com/api/?name=User&background=random&color=fff" id="userAvatar"
                        class="rounded-circle border border-primary border-opacity-50 cursor-pointer hover-scale"
                        width="32" height="32" onclick="window.location.href='profile.html'">
                    <div class="theme-toggle" title="Toggle Theme" style="transform: scale(0.85);">
                        <div class="toggle-knob"><span class="toggle-icon">🌙</span></div>
                    </div>
                    <span class="badge bg-success bg-opacity-75 rounded-pill extra-small">Live</span>
                    <a href="#" id="logoutBtn"
                        class="logout-btn text-danger d-flex align-items-center gap-1 text-decoration-none extra-small fw-bold opacity-75 hover-scale">
                        <i class="bi bi-box-arrow-right fs-5"></i> <span>LOGOUT</span>
                    </a>
                </div>
            </div>
            <div class="chat-messages p-3 d-flex flex-column" id="chatMessages" style="gap: 0.75rem;">
                <!-- Messages go here -->
                <div class="text-center my-3">
                    <span class="text-secondary extra-small px-3 py-1 bg-dark bg-opacity-50 rounded-pill">Conversation
                        Started</span>
                </div>
            </div>
            <div class="p-3 bg-dark bg-opacity-50 mt-auto border-top border-secondary">
                <div class="input-group">
                    <input type="text" class="form-control bg-dark border-0 text-white shadow-none ps-3"
                        placeholder="Share an update..." id="msgInput" style="border-radius: 0.75rem 0 0 0.75rem;">
                    <button class="btn btn-primary-gradient px-3" id="sendBtn"
                        style="border-radius: 0 0.75rem 0.75rem 0;"><i class="bi bi-send-fill"></i></button>
                </div>
                <a href="profile.html" class="nav-link-custom"><i class="bi bi-person-circle"></i> View Profile</a>
                <a href="#" class="nav-link-custom text-danger logout-btn mt-2"><i class="bi bi-box-arrow-right"></i>
                    Logout</a>
            </div>
        </div>

        <!-- Kanban Board -->
        <div class="board-section"
            style="background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent);">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <ul class="nav nav-pills bg-dark bg-opacity-25 p-1 rounded-pill border border-secondary border-opacity-10"
                    id="workspaceTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button
                            class="nav-link active rounded-pill px-4 extra-small fw-bold text-uppercase letter-spacing-1"
                            id="tasks-tab" data-bs-toggle="tab" data-bs-target="#tasks-content" type="button"
                            role="tab">Tasks</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link rounded-pill px-4 extra-small fw-bold text-uppercase letter-spacing-1"
                            id="resources-tab" data-bs-toggle="tab" data-bs-target="#resources-content" type="button"
                            role="tab" onclick="updateActionBtn('resource'); fetchResources()">Resources</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link rounded-pill px-4 extra-small fw-bold text-uppercase letter-spacing-1"
                            id="team-tab" data-bs-toggle="tab" data-bs-target="#team-content" type="button" role="tab"
                            onclick="updateActionBtn('team'); fetchTeam()">Team</button>
                    </li>
                </ul>
                <div class="d-flex gap-2">
                    <button class="btn btn-link text-secondary text-decoration-none me-2 p-0"
                        onclick="fetchWorkspaceDetails()">
                        <i class="bi bi-arrow-clockwise me-1"></i> Refresh
                    </button>
                    <button class="btn btn-outline-primary rounded-pill px-3 extra-small fw-bold" data-bs-toggle="modal"
                        data-bs-target="#inviteMemberModal">
                        <i class="bi bi-person-plus me-2"></i> Invite
                    </button>
                    <button class="btn btn-primary-gradient rounded-pill px-3 shadow-sm extra-small fw-bold"
                        id="actionBtn" data-bs-toggle="modal" data-bs-target="#addTaskModal">
                        <i class="bi bi-plus-lg me-2"></i> New Task
                    </button>
                </div>
            </div>

            <div class="tab-content h-100" id="workspaceTabContent">
                <!-- Tasks Tab -->
                <div class="tab-pane fade show active h-100" id="tasks-content" role="tabpanel">
                    <div class="row g-4 h-100">
                        <div class="col-md-4">
                            <div
                                class="kanban-col bg-dark bg-opacity-25 border border-secondary border-opacity-25 p-3 h-100">
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <h6 class="text-info fw-bold mb-0 letter-spacing-1 small"><i
                                            class="bi bi-circle-fill me-2 extra-small"></i>TO DO</h6>
                                    <span
                                        class="badge bg-dark border border-secondary text-secondary rounded-pill extra-small"
                                        id="todoCount">0</span>
                                </div>
                                <div id="todoCol" class="h-100"></div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div
                                class="kanban-col bg-dark bg-opacity-25 border border-secondary border-opacity-25 p-3 h-100">
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <h6 class="text-warning fw-bold mb-0 letter-spacing-1 small"><i
                                            class="bi bi-circle-fill me-2 extra-small"></i>DOING</h6>
                                    <span
                                        class="badge bg-dark border border-secondary text-secondary rounded-pill extra-small"
                                        id="doingCount">0</span>
                                </div>
                                <div id="doingCol" class="h-100"></div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div
                                class="kanban-col bg-dark bg-opacity-25 border border-secondary border-opacity-25 p-3 h-100">
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <h6 class="text-success fw-bold mb-0 letter-spacing-1 small"><i
                                            class="bi bi-circle-fill me-2 extra-small"></i>DONE</h6>
                                    <span
                                        class="badge bg-dark border border-secondary text-secondary rounded-pill extra-small"
                                        id="doneCount">0</span>
                                </div>
                                <div id="doneCol" class="h-100"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Resources Tab -->
                <div class="tab-pane fade h-100" id="resources-content" role="tabpanel">
                    <div class="glass-card bg-dark bg-opacity-25 border border-secondary border-opacity-25 p-4 h-100">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="fw-bold mb-0">Resource Library</h5>
                            <button class="btn btn-sm btn-outline-info rounded-pill px-3" data-bs-toggle="modal"
                                data-bs-target="#addResourceModal">
                                <i class="bi bi-plus-lg me-1"></i> Add Resource
                            </button>
                        </div>
                        <div id="resourcesList" class="row g-3">
                            <!-- Resources dynamic content -->
                            <div class="col-12 text-center py-5">
                                <i class="bi bi-folder2-open fs-1 text-secondary opacity-25"></i>
                                <p class="text-secondary mt-2">No resources shared yet.</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tab-pane fade h-100" id="team-content" role="tabpanel">
                    <div class="glass-card bg-dark bg-opacity-25 border border-secondary border-opacity-25 p-4 h-100">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="fw-bold mb-0">Team Members</h5>
                            <button class="btn btn-sm btn-outline-primary rounded-pill px-3" data-bs-toggle="modal"
                                data-bs-target="#inviteMemberModal">
                                <i class="bi bi-person-plus me-1"></i> Invite Member
                            </button>
                        </div>
                        <div id="teamList" class="row g-3">
                            <!-- Team members dynamic content -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Task Modal -->
    <div class="modal fade" id="addTaskModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card p-3">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Add Team Task</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addTaskForm">
                        <div class="mb-3">
                            <label class="form-label small text-secondary">Task Title</label>
                            <input type="text" class="form-control bg-dark border-secondary text-white" id="taskTitle"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-secondary">Assigned To</label>
                            <select class="form-select bg-dark border-secondary text-white" id="taskAssign">
                                <option value="">Select Member</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary-gradient w-100 mt-2">Create Task</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Invite Member Modal -->
    <div class="modal fade" id="inviteMemberModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card p-3">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Invite to Team</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="inviteForm">
                        <div class="mb-3">
                            <label class="form-label small text-secondary">Student Username</label>
                            <input type="text" class="form-control bg-dark border-secondary text-white"
                                id="inviteUsername" placeholder="Enter username..." required>
                        </div>
                        <button type="submit" class="btn btn-primary-gradient w-100 mt-2">Send Invitation</button>
                    </form>
                    <div class="mt-4 pt-3 border-top border-secondary">
                        <h6 class="fw-bold small mb-3">Quick Add Friends</h6>
                        <div id="friendsListInvite" class="d-flex flex-column gap-2">
                            <p class="text-secondary small">Loading friends...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Resource Modal -->
    <div class="modal fade" id="addResourceModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card p-3">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Add Resource</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addResourceForm">
                        <div class="mb-3">
                            <label class="form-label small text-secondary">Title</label>
                            <input type="text" class="form-control bg-dark border-secondary text-white" id="resTitle"
                                placeholder="e.g. Project Roadmap" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-secondary">URL / Link</label>
                            <input type="url" class="form-control bg-dark border-secondary text-white" id="resUrl"
                                placeholder="https://..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-secondary">Type</label>
                            <select class="form-select bg-dark border-secondary text-white" id="resType">
                                <option value="link">Link / Website</option>
                                <option value="file">Document / File</option>
                                <option value="video">Tutorial / Video</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary-gradient w-100 mt-2">Share Resource</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Endorse Modal -->
    <div class="modal fade" id="endorseModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card p-3">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Endorse Skills</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="endorseSkillsList" class="d-flex flex-column gap-3">
                        <!-- Skills to endorse -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/chat-pulse.js"></script>
    <script src="assets/js/hero-background.js"></script>
    <script>
        window.addEventListener('load', () => {
            if (window.initHeroBackground) window.initHeroBackground();
        });
    </script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/workspace.js"></script>
    <script src="assets/js/animations.js"></script>
</body>

</html>
