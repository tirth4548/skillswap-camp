<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SkillSwap Campus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/index.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>
    <div class="bg-mesh"></div>
    <div class="cyber-hud-overlay">
        <div class="corner-bracket cb-tl"></div>
        <div class="corner-bracket cb-tr"></div>
        <div class="corner-bracket cb-bl"></div>
        <div class="corner-bracket cb-br"></div>
    </div>
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>
    <div class="floating-orb orb-3"></div>
    <div class="auth-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="glass-card p-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold">SkillSwap <span class="text-primary">Campus</span></h2>
                            <p class="text-secondary">P2P Skill Exchange for Students</p>
                        </div>

                        <ul class="nav nav-pills mb-4 justify-content-center" id="pills-tab" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="pills-login-tab" data-bs-toggle="pill"
                                    data-bs-target="#pills-login" type="button">Login</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="pills-register-tab" data-bs-toggle="pill"
                                    data-bs-target="#pills-register" type="button">Register</button>
                            </li>
                        </ul>

                        <div class="tab-content" id="pills-tabContent">
                            <!-- Login Form -->
                            <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                                <form id="loginForm">
                                    <div class="mb-3">
                                        <label class="form-label text-secondary small">Username</label>
                                        <input type="text" class="form-control bg-dark border-secondary text-white"
                                            id="loginUsername" required>
                                    </div>
                                    <div class="mb-4">
                                        <label class="form-label text-secondary small">Password</label>
                                        <input type="password" class="form-control bg-dark border-secondary text-white"
                                            id="loginPassword" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary-gradient w-100">Sign In</button>
                                </form>
                            </div>

                            <!-- Register Form -->
                            <div class="tab-pane fade" id="pills-register" role="tabpanel">
                                <form id="registerForm">
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label text-secondary small">Username</label>
                                            <input type="text" class="form-control bg-dark border-secondary text-white"
                                                id="regUsername" required>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label text-secondary small">Email</label>
                                            <input type="email" class="form-control bg-dark border-secondary text-white"
                                                id="regEmail" required>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-secondary small">Full Name</label>
                                        <input type="text" class="form-control bg-dark border-secondary text-white"
                                            id="regName" required>
                                    </div>
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label text-secondary small">Department</label>
                                            <input type="text" class="form-control bg-dark border-secondary text-white"
                                                id="regDept" placeholder="e.g. CSE" required>
                                        </div>
                                        <div class="col-md-6 mb-4">
                                            <label class="form-label text-secondary small">Password</label>
                                            <input type="password"
                                                class="form-control bg-dark border-secondary text-white" id="regPass"
                                                required>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary-gradient w-100">Create Account</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/hero-background.js"></script>
    <script>
        window.addEventListener('load', () => {
            if (window.initHeroBackground) window.initHeroBackground();
        });
    </script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/animations.js"></script>
</body>

</html>
